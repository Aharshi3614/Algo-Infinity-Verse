<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Algo Infinity Verse</title>
    <link rel="stylesheet" href="/styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script type="importmap">
      {
        "imports": {
          "supabase-js": "https://esm.sh/@supabase/supabase-js@2"
        }
      }
    </script>

    <!-- Theme Initialization Script -->
    <script>
      (function () {
        try {
          var storedTheme = localStorage.getItem('theme');
          var prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
          var theme = storedTheme || (prefersLight ? 'light' : 'dark');
          if (theme === 'light') {
            document.documentElement.classList.add('light-mode');
          } else {
            document.documentElement.classList.remove('light-mode');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body data-page="login">
    <main class="auth-page">
      <div class="auth-split">
        <!-- LEFT: Form -->
        <div class="auth-split-left">
          <section class="auth-panel">
            <div class="auth-brand">
              <span class="auth-mark">∞</span>
              <h1>Welcome Back</h1>
              <p>Log in to continue your DSA journey.</p>
            </div>

            <form class="auth-form" data-auth-form="login" novalidate>
              <div class="form-group">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" autocomplete="email" required />
              </div>
              <div class="form-group">
                <label for="password">Password</label>
                <div class="auth-password-field">
                  <input
                    id="password"
                    name="password"
                    type="password"
                    autocomplete="current-password"
                    required
                  />
                  <button
                    type="button"
                    class="password-toggle auth-password-toggle"
                    data-target="password"
                    aria-label="Show password"
                    aria-pressed="false"
                    aria-controls="password"
                  >
                    <i class="fas fa-eye"></i>
                  </button>
                </div>
              </div>
              <div style="text-align: right; margin-top: -0.5rem; margin-bottom: 0.5rem">
                <a
                  href="/pages/auth/forgot-password.html"
                  style="font-size: 0.85rem; color: var(--primary-light)"
                >
                  Forgot Password?
                </a>
              </div>
              <p class="auth-message" data-auth-message aria-live="polite"></p>
              <button class="btn btn-primary auth-submit" type="submit">
                <i class="fas fa-right-to-bracket"></i>
                <span>Log In</span>
              </button>
            </form>

            <div class="auth-divider"><span>or</span></div>
            <button class="guest-btn" data-auth-guest type="button" aria-label="Continue as guest">
              <i class="fas fa-user-astronaut"></i>
              <span>Continue as Guest</span>
            </button>
            <p class="auth-switch">
              New here?
              <a href="/signup">Create an account</a>
            </p>
          </section>
        </div>

        <!-- RIGHT: ASCII Art Terminal -->
        <div class="auth-split-right" id="authVisualContainer" aria-hidden="true">
          <!-- canvas injected by modules/auth-visual.js -->
        </div>
      </div>
    </main>

    <script type="module" src="/modules/supabase-auth-client.js"></script>
    <script src="/interceptors.js"></script>
    <script src="/auth.js"></script>
    <script src="/script.js"></script>
    <script type="module" src="/dist/legacy-bundle.mjs"></script>
    <script src="/theme.js"></script>
    <script type="module">
      import { initAuthVisual } from '/modules/auth-visual.js';
      import { initAuthDither } from '/modules/auth-dither.js';
      document.addEventListener('DOMContentLoaded', () => {
        initAuthVisual('authVisualContainer');
        initAuthDither('.auth-split-left');
      });
    </script>
  </body>
</html>
